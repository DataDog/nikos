---
dependency:
  name: galaxy
driver:
  name: vagrant
platforms:
  - name: ubuntu2204
    box: ubuntu/jammy64
    memory: 512
    cpus: 1
provisioner:
  name: ansible
  env:
    TEST_TYPE: "host"
  playbooks:
    converge: ../resources/playbooks/converge.yml
    verify: ../resources/playbooks/verify.yml
verifier:
  name: ansible
